model:
  name: RetinexFormer
  params:
    input_channels: 3
    output_channels: 3
    feature_channels: 32
    stage: 1
    levels: 2
    num_blocks: [1, 1, 1]
    clamp_output: true
data:
  dataset: CommonDataset
  root_dir: path/to/your/dataset
  train_split: train
  val_split: val
  batch_size: 4
  num_workers: 4
  pin_memory: true
  return_filename: true
loss:
  name: retinexformer
  params:
    pixel_weight: 1.0
    illumination_weight: 0.0
  output_index: null
  output_key: null
optimizer:
  name: adam
  lr: 0.0001
  params:
    betas: [0.9, 0.999]
    weight_decay: 0.0
scheduler:
  name: cosineannealinglr
  params:
    T_max: 100
    eta_min: 1.0e-06
train:
  epochs: 100
  device: null
  output_dir: null
  save_every: 1
  validate_every: 1
  log_every: 10
  grad_clip: null
  amp: false
  seed: 42
  resume: null
