model:
  name: URetinexNet
  params:
    input_channels: 3
    unfolding_rounds: 3
    gamma: 0.01
    lambda: 0.01
    gamma_offset: 0.01
    lambda_offset: 0.01
    use_concat_l: true
    adjustment_ratio: 5.0
    adaptive_ratio: false
data:
  dataset: CommonDataset
  root_dir: path/to/your/dataset
  train_split: train
  val_split: val
  batch_size: 4
  num_workers: 4
  pin_memory: true
  return_filename: true
loss:
  name: uretinex
  params:
    low_reconstruction_weight: 1.0
    illumination_prior_weight: 0.1
    illumination_tv_weight: 0.01
    reflectance_weight: 0.1
    adjustment_reconstruction_weight: 1.0
    adjustment_ssim_weight: 1.0
    adjustment_gradient_weight: 0.1
  output_index: null
  output_key: null
optimizer:
  name: adam
  lr: 0.0001
  params:
    betas: [0.9, 0.999]
    weight_decay: 0.0
scheduler:
  name: cosineannealinglr
  params:
    T_max: 100
    eta_min: 1.0e-06
train:
  epochs: 100
  device: null
  output_dir: null
  save_every: 1
  validate_every: 1
  log_every: 10
  grad_clip: null
  amp: false
  seed: 42
  resume: null
