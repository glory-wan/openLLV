model:
  name: LEDNet
  params:
    input_channels: 3
    channels: [32, 64, 128, 128]
    connection: false
    use_side_loss: true
data:
  dataset: CommonDataset
  root_dir: path/to/your/dataset
  train_split: train
  val_split: val
  batch_size: 4
  num_workers: 4
  pin_memory: true
  return_filename: true
loss:
  name: lednet
  params:
    pixel_weight: 1.0
    perceptual_weight: 0.01
    side_loss_weight: 0.8
    use_side_loss: true
    use_perceptual: true
    pretrained_vgg: true
    range_norm: false
  output_index: null
  output_key: null
optimizer:
  name: adam
  lr: 0.0001
  params:
    betas: [0.9, 0.99]
    weight_decay: 0.0
scheduler:
  name: cosineannealinglr
  params:
    T_max: 100
    eta_min: 1.0e-07
train:
  epochs: 100
  device: null
  output_dir: null
  save_every: 1
  validate_every: 1
  log_every: 10
  grad_clip: null
  amp: false
  seed: 10
  resume: null
