model:
  name: KinDPlusPlus
  params:
    input_channels: 3
    decomposition_channels: 32
    restoration_channels: 32
    adjustment_channels: 32
    illumination_ratio: 5.0
data:
  dataset: CommonDataset
  root_dir: path/to/your/dataset
  train_split: train
  val_split: val
  batch_size: 2
  num_workers: 4
  pin_memory: true
  return_filename: true
loss:
  name: kindplusplus
  params:
    decomposition_weight: 1.0
    equal_reflectance_weight: 0.009
    mutual_illumination_weight: 0.2
    input_illumination_weight: 0.15
    restoration_mse_weight: 1.0
    restoration_ssim_weight: 1.0
    adjustment_mse_weight: 1.0
    adjustment_gradient_weight: 1.0
    final_reconstruction_weight: 1.0
    final_ssim_weight: 0.1
  output_index: null
  output_key: null
optimizer:
  name: adam
  lr: 0.0001
  params:
    betas: [0.9, 0.999]
    weight_decay: 0.0
scheduler:
  name: cosineannealinglr
  params:
    T_max: 100
    eta_min: 1.0e-06
train:
  epochs: 100
  device: null
  output_dir: null
  save_every: 1
  validate_every: 1
  log_every: 10
  grad_clip: null
  amp: false
  seed: 42
  resume: null
