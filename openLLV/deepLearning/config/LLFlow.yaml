model:
  name: LLFlow
  params:
    input_channels: 3
    condition_channels: 32
    condition_blocks: 4
    flow_layers: 8
    flow_hidden_channels: 64
    scale_clamp: 2.0
    sample_temperature: 0.0
data:
  dataset: CommonDataset
  root_dir: path/to/your/dataset
  train_split: train
  val_split: val
  batch_size: 2
  num_workers: 4
  pin_memory: true
  return_filename: true
loss:
  name: llflow
  params:
    nll_weight: 1.0
    reconstruction_weight: 1.0
    color_weight: 0.1
    tv_weight: 0.01
    include_constant: false
  output_index: null
  output_key: null
optimizer:
  name: adam
  lr: 0.0001
  params:
    betas: [0.9, 0.999]
    weight_decay: 0.0
scheduler:
  name: cosineannealinglr
  params:
    T_max: 100
    eta_min: 1.0e-06
train:
  epochs: 100
  device: null
  output_dir: null
  save_every: 1
  validate_every: 1
  log_every: 10
  grad_clip: null
  amp: false
  seed: 42
  resume: null
